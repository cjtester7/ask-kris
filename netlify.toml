# ─── Ask Kris — Netlify Configuration ───────────────────
# Version 2

[build]
  publish = "."
  functions = "netlify/functions"

# ─── API ROUTE ────────────────────────────────────────────
[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

# ─── REDIRECTS ───────────────────────────────────────────
[[redirects]]
  from = "/chatbot"
  to   = "/chatbot/"
  status = 301

[[redirects]]
  from = "/qotd"
  to   = "/qotd/"
  status = 301

# ─── SECURITY HEADERS ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/chatbot/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; frame-ancestors 'self' https://therealestateroundup.com"

[[headers]]
  for = "/qotd/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; frame-ancestors 'self' https://therealestateroundup.com"
