# ─── Ask Kris — Netlify Configuration ───────────────────
# Version 5

[build]
  publish = "."
  functions = "netlify/functions"

# ─── API ROUTES ───────────────────────────────────────────
[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from   = "/api/subscribe"
  to     = "/.netlify/functions/subscribe"
  status = 200

# ─── SECURITY HEADERS ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.resend.com https://script.google.com https://script.googleusercontent.com; img-src 'self' data:; frame-ancestors 'self' https://therealestateroundup.com"
